## NOTE: This file is a reference template only.
## The actual Secret is created dynamically in CI (deploy.yml) using:
##   kubectl create secret generic enquiry-app-secret \
##     --from-literal=MONGODB_URI="..." \
##     --from-literal=JWT_SECRET="..." \
##     --dry-run=client -o yaml | kubectl apply -f -
##
## DO NOT commit real secret values here.
## DO NOT apply this file directly.
##
## Required GitHub Actions Secrets:
##   - MONGODB_URI  : MongoDB Atlas connection string
##   - JWT_SECRET   : Strong random string (generate: openssl rand -base64 32)
##   - EC2_HOST     : EC2 public IP / hostname
##   - EC2_USERNAME : SSH username (e.g. ubuntu)
##   - EC2_SSH_KEY  : Private SSH key for EC2 access
