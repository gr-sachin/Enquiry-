apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  prometheus.yaml: |-
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      orgId: 1
      url: http://prometheus-service:9090
      isDefault: true
      version: 1
      editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  provider.yaml: |-
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nodejs
data:
  # Using a standard Node.js monitoring dashboard JSON (simplified)
  # You can replace this with a complete Next.js/Node.js dashboard JSON from Grafana site
  nodejs.json: |-
    {
      "title": "Node.js Application Dashboard",
      "tags": ["nodejs", "prometheus"],
      "timezone": "browser",
      "panels": [
        {
          "type": "stat",
          "title": "Uptime",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "targets": [
            { "expr": "process_uptime_seconds", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU Usage",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            { "expr": "rate(process_cpu_seconds_total[1m])", "refId": "A" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory Usage",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            { "expr": "process_resident_memory_bytes", "refId": "A" }
          ]
        }
      ],
      "schemaVersion": 36,
      "version": 1
    }
